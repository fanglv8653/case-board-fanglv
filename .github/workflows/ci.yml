name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (build + typecheck)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - name: Source version, license and release-boundary gate
        run: pnpm validate:source

      - name: Node logic and UI contract tests
        run: pnpm test:logic

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Vite build
        run: pnpm build

  rust:
    name: Rust (check + clippy + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Rust format check (release-prep files)
        run: >-
          rustfmt --edition 2021 --check
          src-tauri/src/lpr.rs
          src-tauri/examples/verify_updater_signature.rs

      - name: cargo check
        run: cargo check --workspace --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked
