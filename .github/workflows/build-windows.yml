name: Build Windows

# 在 Windows runner 上编译 .exe 安装器(NSIS),供 Release 分发。
# 公开仓的 GitHub-hosted runner 免费。手动触发:
#   gh workflow run build-windows.yml
# macOS 的 dmg 在本机用 scripts/release.sh 打包,这里只补 Windows 包。
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "待验证的发布标签，必须严格为 v<source-version>-fanglv"
        required: true

jobs:
  build-windows:
    name: Build Windows installer (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@1.96.0

      # 注意:Cargo workspace 的 target 在仓库根 target/(不在 src-tauri/target)。
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Source version, license and release-boundary gate
        run: pnpm validate:source

      - name: Node logic and UI contract tests
        run: pnpm test:logic

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Vite build
        run: pnpm build

      - name: Rust check and tests
        run: |
          cargo check --workspace --all-targets --locked
          cargo test --workspace --locked

      - name: Require updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required"
          }
          Write-Host "Updater signing secrets are present (values not printed)."

      # 应用内更新签名:私钥来自仓库 Actions secret(加密存储,fork 的 PR 拿不到)。
      # 注入后 createUpdaterArtifacts 会为 NSIS 安装包生成同名 .sig 签名文件。
      # 匿名使用统计:注入 anon/publishable key(低权限,只能写 usage_events;
      # 缺失时代码里 option_env! 取不到 → 统计自动禁用)。fork 的 PR 拿不到这些 secret。
      - name: Build Windows installer (NSIS .exe)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CASEBOARD_TELEMETRY_URL: ${{ secrets.CASEBOARD_TELEMETRY_URL }}
          CASEBOARD_TELEMETRY_KEY: ${{ secrets.CASEBOARD_TELEMETRY_KEY }}
        run: pnpm tauri build --bundles nsis

      # 启动期冒烟:release 是 panic=abort,启动 panic 会立即退出并把信息打到 stderr。
      # 进程活过 12 秒(窗口/webview 已起)即认为冒烟通过。
      - name: Smoke run (catch startup crash)
        shell: pwsh
        run: |
          $env:CASEBOARD_DATA_DIR = Join-Path $env:RUNNER_TEMP "caseboard-smoke-data"
          $env:WEBVIEW2_USER_DATA_FOLDER = Join-Path $env:RUNNER_TEMP "caseboard-smoke-webview2"
          New-Item -ItemType Directory -Force $env:CASEBOARD_DATA_DIR | Out-Null
          New-Item -ItemType Directory -Force $env:WEBVIEW2_USER_DATA_FOLDER | Out-Null
          Get-ChildItem target/release -Filter *.exe | ForEach-Object { Write-Host "exe: $($_.Name)" }
          $cand = @("target/release/caseboard.exe", "target/release/案件看板.exe") | Where-Object { Test-Path $_ }
          if (-not $cand) {
            $cand = Get-ChildItem target/release -Filter *.exe |
              Where-Object { $_.Name -notmatch "setup|uninstall" } |
              Select-Object -First 1 -ExpandProperty FullName
          }
          $exe = $cand | Select-Object -First 1
          if (-not $exe) { Write-Error "no runnable exe found in target/release"; exit 1 }
          Write-Host "smoke target: $exe"
          try {
            $p = Start-Process -FilePath $exe -PassThru `
                   -RedirectStandardError smoke-err.txt -RedirectStandardOutput smoke-out.txt
            Start-Sleep -Seconds 12
            if ($p.HasExited) {
              Write-Host "APP EXITED EARLY (code $($p.ExitCode))"
              Get-Content smoke-err.txt -ErrorAction SilentlyContinue
              Get-Content smoke-out.txt -ErrorAction SilentlyContinue
              Get-Content (Join-Path $env:CASEBOARD_DATA_DIR "crash.log") -ErrorAction SilentlyContinue
              throw "isolated smoke process exited early"
            }
            Write-Host "Smoke OK - app alive after 12s"
          } finally {
            if ($p -and -not $p.HasExited) { Stop-Process -Id $p.Id -Force }
          }

      - name: Locate exact updater artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $expectedTag = "v$version-fanglv"
          if ("${{ inputs.release_tag }}" -ne $expectedTag) {
            throw "release_tag must be $expectedTag"
          }
          $installers = @(Get-ChildItem target/release/bundle/nsis -File -Filter "*-setup.exe")
          $signatures = @(Get-ChildItem target/release/bundle/nsis -File -Filter "*.sig")
          if ($installers.Count -ne 1) { throw "expected exactly one NSIS installer" }
          if ($signatures.Count -ne 1) { throw "expected exactly one updater .sig" }
          if ($signatures[0].FullName -ne "$($installers[0].FullName).sig") {
            throw "updater .sig must have the exact installer basename"
          }
          "installer=$($installers[0].FullName)" >> $env:GITHUB_OUTPUT
          "signature=$($signatures[0].FullName)" >> $env:GITHUB_OUTPUT
          "artifact_dir=$($installers[0].DirectoryName)" >> $env:GITHUB_OUTPUT

      - name: Verify final installer updater minisign
        run: >-
          cargo run --locked --manifest-path src-tauri/Cargo.toml
          --example verify_updater_signature --
          src-tauri/tauri.conf.json
          "${{ steps.artifacts.outputs.signature }}"
          "${{ steps.artifacts.outputs.installer }}"

      - name: Record Authenticode status without making a false claim
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -LiteralPath "${{ steps.artifacts.outputs.installer }}"
          Write-Host "Authenticode status: $($signature.Status)"
          Write-Host "Updater minisign verification above is independent from Windows Authenticode."
          if ($signature.Status -notin @("Valid", "NotSigned")) {
            throw "unexpected Authenticode status: $($signature.Status)"
          }

      - name: Generate validated local latest.json draft
        run: >-
          node scripts/release-gate.mjs --mode release
          --tag "${{ inputs.release_tag }}"
          --artifact-dir "${{ steps.artifacts.outputs.artifact_dir }}"
          --base-url "https://github.com/fanglv8653/case-board-fanglv/releases/download"
          --draft-output "${{ runner.temp }}/latest.json"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: caseboard-windows-exe
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
            ${{ runner.temp }}/latest.json
          if-no-files-found: error
