name: 🐛 Bug 报告
description: 报告一个 bug 或异常行为
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你抽时间报告 bug。请尽量填全以下信息,方便我们快速定位问题。

        **⚠️ 隐私提示**: 不要在报告中粘贴真实当事人姓名、案号、电话、身份证号等。如需举例,请用化名或脱敏数据。

  - type: textarea
    id: what-happened
    attributes:
      label: 现象描述
      description: 你看到了什么?预期看到什么?
      placeholder: 描述具体发生了什么……
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 一步步告诉我们怎么复现
      placeholder: |
        1. 打开 App
        2. 点"导入案件"
        3. 选某个文件夹
        4. 看到错误 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      placeholder: 应该看到 ……
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: CaseBoard 版本
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS 版本
      placeholder: e.g. 14.5 (Sonoma)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 报错堆栈
      description: 如有,粘贴控制台输出或错误信息
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图(可选)
      description: 直接拖到此处即可上传

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 issue,确认没有重复
          required: true
        - label: 我没有在报告中暴露任何真实当事人/案件数据
          required: true
