name: ✨ 功能建议
description: 提一个新功能或改进建议
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议!请描述你希望解决的真实场景,而不是直接描述实现方案——
        了解你的"痛"比知道"怎么改"更有价值。

  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 在什么场景下、什么时候、什么操作中你觉得不顺?
      placeholder: 描述你的真实使用场景 ……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你希望的解决方式
      description: 可以提具体方案,也可以只描述期待的结果
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的其他方案
      description: 有没有别的工作流可以绕开这个问题?为什么不够好?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 范围
      options:
        - 诉讼工作流
        - 非诉工作流
        - 文件夹扫描/抽取
        - 执行阶段追踪
        - AI 接入(MCP)
        - 界面/可用性
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 issue,确认没有重复建议
          required: true
        - label: 我没有在建议中暴露任何真实当事人/案件数据
          required: true
